<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志凌 | 视觉设计师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .project-card { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .project-card:hover { transform: translateY(-16px) scale(1.03); box-shadow: 0 40px 70px -15px rgb(0 0 0 / 0.5); }
        .overlay { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .project-card:hover .overlay { opacity: 1; }
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.8) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-white dark:bg-white dark:text-zinc-950 transition-colors duration-500">

<!-- Navbar -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/80 dark:bg-white/80 backdrop-blur-xl border-b border-white/10 dark:border-zinc-950/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <div class="text-2xl font-bold heading tracking-tighter">志凌</div>
        <div class="hidden md:flex gap-10 text-sm font-medium">
            <a href="#works" class="hover:text-teal-400 transition">作品</a>
            <a href="#about" class="hover:text-teal-400 transition">关于我</a>
            <a href="#contact" class="hover:text-teal-400 transition">联系</a>
        </div>
        <button id="theme-toggle" class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-white/10 dark:hover:bg-zinc-900 transition">
            <i class="fas fa-moon text-xl"></i>
        </button>
    </div>
</nav>

<!-- Hero -->
<section class="min-h-screen flex items-center relative overflow-hidden bg-[radial-gradient(at_center,#4f46e520_0%,transparent_70%)]">
    <div class="max-w-7xl mx-auto px-6 pt-20 text-center">
        <h1 class="text-7xl md:text-8xl heading font-bold tracking-tighter mb-6">志凌</h1>
        <p class="text-3xl md:text-4xl text-teal-400 mb-8">视觉设计师 · 香港</p>
        <p class="text-xl text-zinc-400 dark:text-zinc-600 max-w-md mx-auto">用设计讲故事，用视觉传递情感</p>
        <a href="#works" class="mt-12 inline-flex items-center gap-3 px-10 py-4 bg-white dark:bg-zinc-900 text-black dark:text-white rounded-2xl font-medium hover:scale-105 transition">查看作品 <i class="fas fa-arrow-down"></i></a>
    </div>
</section>

<!-- Works -->
<section id="works" class="max-w-7xl mx-auto px-6 py-24">
    <div class="text-center mb-16">
        <span class="text-teal-400 text-sm tracking-widest">SELECTED WORKS</span>
        <h2 class="text-5xl heading font-bold mt-3">精选作品</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div onclick="showProject(1)" class="project-card group bg-zinc-900 dark:bg-zinc-100 rounded-3xl overflow-hidden cursor-pointer relative">
            <div class="aspect-video overflow-hidden">
                <img src="https://picsum.photos/id/1015/800/600" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
            </div>
            <div class="overlay absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-8">
                <div class="text-teal-400 text-xs mb-2">2025 · 品牌视觉</div>
                <div class="text-2xl font-semibold">NAKULA 时尚品牌重塑</div>
            </div>
        </div>
        <div onclick="showProject(2)" class="project-card group bg-zinc-900 dark:bg-zinc-100 rounded-3xl overflow-hidden cursor-pointer relative">
            <div class="aspect-video overflow-hidden">
                <img src="https://picsum.photos/id/201/800/600" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
            </div>
            <div class="overlay absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-8">
                <div class="text-teal-400 text-xs mb-2">2025 · UI/UX</div>
                <div class="text-2xl font-semibold">Peak 运动 App</div>
            </div>
        </div>
        <div onclick="showProject(3)" class="project-card group bg-zinc-900 dark:bg-zinc-100 rounded-3xl overflow-hidden cursor-pointer relative">
            <div class="aspect-video overflow-hidden">
                <img src="https://picsum.photos/id/30/800/600" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
            </div>
            <div class="overlay absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-8">
                <div class="text-teal-400 text-xs mb-2">2024 · 包装设计</div>
                <div class="text-2xl font-semibold">Harrow 咖啡品牌</div>
            </div>
        </div>
    </div>
</section>

<!-- About -->
<section id="about" class="bg-zinc-900 dark:bg-zinc-100 py-24 text-white dark:text-zinc-950">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
        <div>
            <img src="https://picsum.photos/id/64/800/800" alt="志凌" class="rounded-3xl w-full">
        </div>
        <div>
            <h2 class="text-5xl heading font-bold mb-8">关于我</h2>
            <p class="text-lg leading-relaxed mb-8">我是志凌，一位来自香港的视觉设计师。6 年经验，帮助 30+ 品牌打造视觉语言。专注品牌设计、UI/UX 与数字体验。</p>
            <div class="grid grid-cols-3 gap-6 text-center">
                <div><div class="text-4xl font-bold text-teal-400">60+</div><div class="text-sm">项目</div></div>
                <div><div class="text-4xl font-bold text-teal-400">18</div><div class="text-sm">品牌</div></div>
                <div><div class="text-4xl font-bold text-teal-400">6</div><div class="text-sm">年经验</div></div>
            </div>
        </div>
    </div>
</section>

<!-- Contact -->
<section id="contact" class="max-w-7xl mx-auto px-6 py-24">
    <div class="max-w-xl mx-auto text-center">
        <h2 class="text-5xl heading font-bold mb-6">一起创作吧</h2>
        <p class="text-zinc-400 dark:text-zinc-600">有合作意向？随时联系我！</p>
        <form class="mt-12 space-y-6">
            <input type="text" placeholder="您的名字" class="w-full bg-zinc-900 dark:bg-white border border-white/20 dark:border-zinc-300 rounded-2xl px-8 py-6 focus:outline-none focus:border-teal-400">
            <input type="email" placeholder="邮箱 / 微信" class="w-full bg-zinc-900 dark:bg-white border border-white/20 dark:border-zinc-300 rounded-2xl px-8 py-6 focus:outline-none focus:border-teal-400">
            <textarea placeholder="项目简述..." rows="5" class="w-full bg-zinc-900 dark:bg-white border border-white/20 dark:border-zinc-300 rounded-2xl px-8 py-6 focus:outline-none focus:border-teal-400"></textarea>
            <button type="submit" class="w-full bg-teal-400 hover:bg-teal-500 text-black font-medium py-6 rounded-2xl transition">发送消息</button>
        </form>
    </div>
</section>

<!-- Footer -->
<footer class="bg-black dark:bg-white py-8 text-center text-xs text-zinc-500 dark:text-zinc-400">
    © 2026 志凌 · 香港视觉设计师 · All Rights Reserved
</footer>

<!-- 项目弹窗 -->
<div id="modal" class="hidden fixed inset-0 bg-black/90 dark:bg-white/90 z-[100] flex items-center justify-center p-6">
    <div class="modal bg-zinc-900 dark:bg-white max-w-4xl w-full rounded-3xl overflow-hidden relative">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-4xl z-10 text-white dark:text-black">✕</button>
        <div id="modal-content" class="p-10"></div>
    </div>
</div>

<script>
    tailwind.config = { content: ["*"], darkMode: 'class' }
    
    // 默认黑夜 + 切换
    const html = document.documentElement
    const toggle = document.getElementById('theme-toggle')
    let isDark = true
    
    function updateIcon() {
        toggle.innerHTML = isDark 
            ? `<i class="fas fa-sun text-xl"></i>` 
            : `<i class="fas fa-moon text-xl"></i>`
    }
    updateIcon()
    
    toggle.addEventListener('click', () => {
        isDark = !isDark
        if (isDark) {
            html.classList.add('dark')
        } else {
            html.classList.remove('dark')
        }
        updateIcon()
    })
    
    // 导航滚动效果
    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('shadow-xl', window.scrollY > 50)
    })
    
    // 项目弹窗
    function showProject(id) {
        const content = document.getElementById('modal-content')
        const projects = {
            1: `<img src="https://picsum.photos/id/1015/1200/800" class="rounded-3xl w-full mb-8"><h3 class="text-4xl heading">NAKULA 时尚品牌重塑</h3><p class="mt-4 text-zinc-400 dark:text-zinc-600">2025 完整视觉系统设计</p>`,
            2: `<img src="https://picsum.photos/id/201/1200/800" class="rounded-3xl w-full mb-8"><h3 class="text-4xl heading">Peak 运动 App</h3><p class="mt-4 text-zinc-400 dark:text-zinc-600">UI/UX + 品牌视觉</p>`,
            3: `<img src="https://picsum.photos/id/30/1200/800" class="rounded-3xl w-full mb-8"><h3 class="text-4xl heading">Harrow 咖啡品牌</h3><p class="mt-4 text-zinc-400 dark:text-zinc-600">包装与店铺视觉系统</p>`
        }
        content.innerHTML = projects[id]
        document.getElementById('modal').classList.remove('hidden')
        document.getElementById('modal').classList.add('flex')
    }
    function closeModal() {
        const modal = document.getElementById('modal')
        modal.classList.add('hidden')
        modal.classList.remove('flex')
    }
</script>
</body>
</html>
